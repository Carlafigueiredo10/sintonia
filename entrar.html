<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Entrar — Sintonia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300;9..144,400;9..144,500;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-top: #e8c9a8;
    --sky-high: #d4a589;
    --sky-mid: #9a7670;
    --sky-low: #4a4558;
    --sky-base: #22243a;
    --ink: #15162a;
    --ink-soft: #2a2c45;
    --cream: #faf0dc;
    --cream-dim: #e0d2ba;
    --accent: #7a2a1a;
    --accent-bright: #c4654a;
    --serif: 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    color: var(--ink);
    font-family: var(--serif);
    font-weight: 300;
    line-height: 1.5;
    background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-mid) 60%, var(--sky-base) 100%);
    background-attachment: fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    max-width: 420px;
    width: 100%;
    text-align: center;
  }

  .mark {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 1.35rem;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 3rem;
    letter-spacing: -0.02em;
  }

  .mark::after {
    content: " ·";
    color: var(--accent);
  }

  h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(2rem, 5vw, 3rem);
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin-bottom: 1rem;
  }

  h1 em {
    font-style: italic;
    font-weight: 500;
    color: var(--accent);
    font-variation-settings: "SOFT" 100, "WONK" 1;
  }

  .sub {
    font-family: var(--serif);
    font-size: 1.05rem;
    color: var(--ink-soft);
    margin-bottom: 2.5rem;
    line-height: 1.5;
  }

  .google-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    background: var(--ink);
    color: var(--cream);
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 1.1rem 1.8rem;
    text-decoration: none;
    border: 1px solid var(--ink);
    transition: all 0.3s ease;
    cursor: pointer;
    width: 100%;
    max-width: 320px;
  }

  .google-btn:hover:not(:disabled) {
    background: var(--accent);
    border-color: var(--accent);
  }

  .google-btn:disabled {
    opacity: 0.5;
    cursor: progress;
  }

  .google-btn svg {
    width: 18px;
    height: 18px;
  }

  .footnote {
    margin-top: 2.5rem;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    opacity: 0.7;
  }

  .footnote a {
    color: inherit;
    border-bottom: 1px solid rgba(21, 22, 42, 0.25);
    text-decoration: none;
    padding-bottom: 1px;
  }

  .footnote a:hover { color: var(--accent); }

  .error {
    display: none;
    margin-top: 1.5rem;
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  .error.visible { display: block; }

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
    align-items: center;
    max-width: 320px;
    margin: 0 auto;
  }

  .login-form input {
    width: 100%;
    font-family: var(--serif);
    font-size: 1.05rem;
    color: var(--ink);
    background: rgba(250, 240, 220, 0.45);
    border: 1px solid rgba(21, 22, 42, 0.25);
    padding: 0.95rem 1.1rem;
    outline: none;
    transition: border-color 0.25s ease, background 0.25s ease;
  }

  .login-form input::placeholder {
    color: rgba(21, 22, 42, 0.45);
    font-style: italic;
  }

  .login-form input:focus {
    border-color: var(--ink);
    background: rgba(250, 240, 220, 0.7);
  }

  .login-form input:disabled {
    opacity: 0.55;
    cursor: progress;
  }

  .login-form .google-btn { margin-top: 0.5rem; }
</style>
</head>
<body>
  <div class="card">
    <div class="mark">Sintonia</div>
    <h1>Bem-vinda <em>de volta</em>.</h1>
    <p class="sub">Acesso restrito ao time. Entre com seu email e senha.</p>

    <form id="loginForm" class="login-form" novalidate>
      <label class="visually-hidden" for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="email" autocomplete="username" required>

      <label class="visually-hidden" for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="senha" autocomplete="current-password" required>

      <button class="google-btn" id="submitBtn" type="submit">
        <span id="submitLabel">Entrar</span>
      </button>
    </form>

    <div class="error" id="errorMsg" role="alert"></div>

    <div class="footnote">
      <a href="index.html">← voltar para a home</a>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';

    const SUPABASE_URL = 'https://rwdiujiuryiwqfsviitf.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_9JmoCSyrmfCqLB_ThbfWFQ_GGu3EuDe';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const btn = document.getElementById('submitBtn');
    const btnLabel = document.getElementById('submitLabel');
    const errorEl = document.getElementById('errorMsg');

    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      window.location.replace('interessadas.html');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('visible');

      const email = emailInput.value.trim().toLowerCase();
      const password = passwordInput.value;

      if (!email || !password) {
        errorEl.textContent = 'Preenche email e senha.';
        errorEl.classList.add('visible');
        return;
      }

      btn.disabled = true;
      emailInput.disabled = true;
      passwordInput.disabled = true;
      btnLabel.textContent = 'Entrando…';

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        console.error('Sign-in error', error);
        if (error.message && /invalid login credentials/i.test(error.message)) {
          errorEl.textContent = 'Email ou senha não conferem.';
        } else if (error.message && /email not confirmed/i.test(error.message)) {
          errorEl.textContent = 'Esse email ainda não foi confirmado.';
        } else {
          errorEl.textContent = 'Algo deu errado. Tenta de novo em um instante.';
        }
        errorEl.classList.add('visible');
        btn.disabled = false;
        emailInput.disabled = false;
        passwordInput.disabled = false;
        btnLabel.textContent = 'Entrar';
        return;
      }

      window.location.replace('interessadas.html');
    });
  </script>
</body>
</html>
